name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL }}
      # Where the preview-build step finds the sibling sources (checked out below).
      LOOM_REPO: ${{ github.workspace }}/.preview-src/loom
      LATTICE_PREVIEW_APP: ${{ github.workspace }}/.preview-src/lattice-ui/apps/loom-preview
      # Deploys must include previews: a missing/empty checkout should fail the
      # build loudly rather than silently skip (the local default is a soft skip).
      PREVIEW_BUILD_STRICT: "1"
    steps:
      - name: Checkout docs
        uses: actions/checkout@v6

      # The interactive component previews are rendered by Loom (a sibling
      # roblox-ts → browser renderer) from the lattice-ui preview targets. Both
      # are public repos, so no token is needed.
      - name: Checkout Loom
        uses: actions/checkout@v6
        with:
          repository: astra-void/loom
          path: .preview-src/loom

      - name: Checkout lattice-ui
        uses: actions/checkout@v6
        with:
          repository: astra-void/lattice-ui
          path: .preview-src/lattice-ui

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # Loom's layout engine is Rust compiled to WebAssembly; its `prepare`
      # script builds it via wasm-pack on install.
      - name: Setup Rust (wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .preview-src/loom

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Loom dependencies (builds the layout WASM)
        working-directory: .preview-src/loom
        run: pnpm install --frozen-lockfile

      # lattice-ui is consumed from source by Loom, so only the workspace links
      # are needed — skip its build/prepare scripts (roblox-ts compile).
      - name: Install lattice-ui workspace links
        working-directory: .preview-src/lattice-ui
        run: pnpm install --frozen-lockfile --ignore-scripts

      # `pnpm build` now runs `preview:build` first (chained in package.json),
      # so the previews are regenerated as part of the docs build.
      - name: Build docs
        run: pnpm build

      - name: Create CNAME file
        if: vars.DOCS_CUSTOM_DOMAIN != ''
        run: echo "${{ vars.DOCS_CUSTOM_DOMAIN }}" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
